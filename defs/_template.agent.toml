# Unified agent definition — build with ./transpile.sh
# Copy to defs/<name>.agent.toml (files starting with "_" are skipped by the build).
# Generates: claude/agents/<name>.md, gemini/agents/<name>.md,
#            opencode/agents/<name>.md, codex/agents/<name>.toml
# Every documented field of every harness is listed below; uncomment what you need.
# Fields inside [harness] tables use that harness's REAL field names.

kind = "agent"
name = "my-agent"
# Drives delegation in every harness — be specific, include trigger phrases.
description = "Use this agent when <situation>. Examples - <trigger 1>, <trigger 2>."
# targets = ["claude", "gemini", "opencode", "codex"]   # default: all four

# Portable fields (a [harness] table value overrides these):
# temperature = 0.2      # gemini + opencode
# max_turns = 30         # claude (as maxTurns) + gemini
# mode = "subagent"      # opencode: primary | subagent | all; default subagent

# Shared system prompt. Body syntax: <!-- only: h1, h2 --> ... <!-- /only --> keeps
# a section for the listed harnesses only. Don't use !`cmd` here — no harness
# shell-preprocesses agent prompts.
body = '''
You are a <role> specializing in <domain>.

This body becomes the agent's system prompt (developer_instructions in codex),
so spell out everything the agent needs.

## Process

1. <first step>
2. <second step>

## Output

Return <exact shape of the result to hand back to the caller>.

## Constraints

- <hard rule>
'''

