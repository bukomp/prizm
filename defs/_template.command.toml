# agent = "general-purpose"
# disable-model-invocation = true
# user-invocable = false
# when_to_use = "..."
# paths = "src/**"
# shell = "bash"
# raw = '''extra frontmatter lines'''
# body = '''claude-specific prompt override'''

[gemini]
# Gemini command TOML has only description + prompt; use raw for future fields.
# raw = '''extra toml lines'''
# body = '''gemini-specific prompt override (write {{args}} directly here)'''

