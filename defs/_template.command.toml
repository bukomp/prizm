# Unified command definition — build with ./transpile.sh
# Copy to defs/<name>.command.toml (files starting with "_" are skipped by the build).
# The command's name and kind come from the file name (name = / kind = keys
# override it). Generates:
#            claude/commands/<name>.md      (/<name>)
#            gemini/commands/<name>.toml    (/<name>)
#            opencode/commands/<name>.md    (/<name>)
#            codex/prompts/<name>.md        (/prompts:<name> — deprecated in Codex;
#                                            set emit = "skill" in [codex] instead)

description = "<One line - what this command does>"
# targets = ["claude", "gemini", "opencode", "codex"]   # default: all four

# Portable body syntax, rewritten per harness:
# - $ARGUMENTS: everything typed after the command (gemini: {{args}})
# - $1..$9: positional args, ALWAYS 1-based here (claude output is shifted to its
#   0-based convention automatically; never write $0 yourself)
# - !`cmd`: inline shell (gemini: !{cmd}; codex cannot run shell in prompts, so it
#   becomes a bracketed "run this command" instruction)
# - <!-- only: h1, h2 --> ... <!-- /only -->: section for listed harnesses only
body = '''
<Prompt sent when the user invokes the command.>

All arguments: $ARGUMENTS

Optional dynamic context (remove if unused):
- Inline shell output: !`git status --short`

## Task

<What the model should do, step by step.>
'''

